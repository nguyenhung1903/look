# Pre-commit hooks configuration
# Hooks auto-installed via nix develop / flake

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=5000"]
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: cargo-fmt-core
        name: cargo fmt (core workspace)
        entry: cargo fmt --manifest-path core/Cargo.toml --all -- --check
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-fmt-ffi
        name: cargo fmt (ffi workspace)
        entry: cargo fmt --manifest-path bridge/ffi/Cargo.toml --all -- --check
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-check-core
        name: cargo check (core workspace)
        entry: cargo check --workspace --manifest-path core/Cargo.toml
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-clippy-core
        name: cargo clippy (core workspace)
        entry: cargo clippy --workspace --manifest-path core/Cargo.toml -- -D warnings
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-test-core
        name: cargo test (core workspace)
        entry: cargo test --workspace --manifest-path core/Cargo.toml
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-test-ffi
        name: cargo test (ffi)
        entry: cargo test --manifest-path bridge/ffi/Cargo.toml
        language: system
        pass_filenames: false
        types: [rust]

      - id: secrets
        name: Detect secrets
        entry: bash -c 'grep -rnE "(password|secret|token|api_key|apikey|private_key)" --include="*.rs" --include="*.toml" --include="*.yaml" --include="*.yml" --exclude-dir=target . | grep -v "^[^\:]+\:\s*//\|#" || true'
        language: system
        pass_filenames: false

ci:
  autoupdate_schedule: monthly
  autoupdate_commit_msg: "chore: update pre-commit hooks"
